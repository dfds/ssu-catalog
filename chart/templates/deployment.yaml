apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ssu-catalog.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ssu-catalog.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ssu-catalog.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ssu-catalog.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ssu-catalog.serviceAccountName" . }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.env }}
          env:
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.envFromSecret }}
          {{- end }}
          ports:
            - name: http
              protocol: TCP
              containerPort: {{ .Values.service.port }}
            - name: metrics
              protocol: TCP
              containerPort: {{ .Values.service.metricsPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
